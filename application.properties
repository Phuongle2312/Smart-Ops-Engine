# ============================================================
# Smart Ops Engine — application.properties
# ⚠️  KHÔNG commit file này lên Git nếu chưa dùng biến môi trường
# Khuyến nghị: thêm application.properties vào .gitignore
# ============================================================

# Server
server.port=8080

# ============================================================
# Database — SQL Server
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=smart_ops_engine;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa

# ✅ FIX: Không hardcode mật khẩu — set biến môi trường DB_PASSWORD trước khi chạy
# Windows PowerShell : $env:DB_PASSWORD="Phuongle866"
# Windows CMD        : set DB_PASSWORD=Phuongle866
# Hoặc dùng Run Config trong IntelliJ/VS Code để set env var
spring.datasource.password=Phuongle866

spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ============================================================
# Email — Office 365 SMTP
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=letriphuong23.12@gmail.com

# ✅ FIX: set biến môi trường MAIL_PASSWORD trước khi chạy
# Windows PowerShell: $env:MAIL_PASSWORD="your_email_password"
spring.mail.password=kfwq pwbw havr lhol

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ============================================================
# ✅ FIX: Smart Ops Engine — Custom config
# Thiếu những dòng này → Spring Boot lỗi ngay lúc khởi động
# ============================================================

# Email nhận cảnh báo sự cố
smartops.alert.recipient.email=letriphuong23.12@gmail.com

# Tên hệ thống hiển thị trong email alert
smartops.system-name=Smart Ops Engine v1.0

# AES key để mã hóa/giải mã mật khẩu SSH của Node
# Cách tạo key: openssl rand -base64 32
# Sau đó set: $env:AES_SECRET_KEY="key_vừa_tạo"
smartops.aes.secret-key=MySuperSecretKey1234567890123456

# Tần suất health check — 300000ms = 5 phút
smartops.scheduler.disk-check-interval-ms=300000

# Lịch báo cáo sáng: 8:00 AM thứ 2 đến thứ 6
smartops.scheduler.daily-report-cron=0 0 8 * * MON-FRI

# Ngưỡng cảnh báo disk (%)
smartops.threshold.disk-warning=80
smartops.threshold.disk-critical=90
